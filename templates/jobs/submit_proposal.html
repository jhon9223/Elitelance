{% extends "jobs/jobs_base.html" %}

{% block title %}Apply | EliteLance{% endblock %}

{% block content %}

<div class="flex justify-center items-center min-h-screen px-6">

    <div class="w-full max-w-2xl bg-black/40 backdrop-blur-lg p-10 rounded-2xl border border-white/10">

        <h2 class="text-3xl font-bold mb-6">
            Apply for "{{ job.title }}"
        </h2>

        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <div>
                <label class="block mb-2 text-sm opacity-80">
                    Your Bid Amount
                </label>
                {{ form.bid_amount }}
            </div>

            <div>
                <button type="button" onclick="generateProposal()"
                    class="mb-3 bg-indigo-600 px-4 py-2 rounded-xl text-sm font-semibold">
                    ✨ Generate Proposal
                </button>
                <label class="block mb-2 text-sm opacity-80">
                    Cover Letter
                </label>
                {{ form.cover_letter }}
            </div>

            <button type="submit"
                class="w-full bg-gradient-to-r from-purple-500 to-pink-500 py-3 rounded-xl font-semibold hover:opacity-90 transition">
                Submit Proposal
            </button>

        </form>

    </div>

</div>

{% endblock %}

{% block extra_js %}
<script>

    function getCSRFToken() {
        return document.querySelector('[name=csrfmiddlewaretoken]').value;
    }

    function generateProposal() {

        const jobTitle = "{{ job.title }}";

        fetch("/jobs/ai/generate-proposal/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCSRFToken()
            },
            body: JSON.stringify({ title: jobTitle })
        })
            .then(res => res.json())
            .then(data => {
                document.querySelector('textarea[name="cover_letter"]').value = data.proposal;
            });

    }

</script>
{% endblock %}
